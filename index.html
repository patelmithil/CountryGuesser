<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Country Guesser</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;background:linear-gradient(135deg,#0c0d2e 0%,#1a1b4b 50%,#2d1b69 100%);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px;color:#fff;overflow-y:auto}
.game-container{max-width:640px;width:100%;margin:auto;padding:10px 0 30px}
.hidden{display:none!important}

.start-screen{text-align:center;animation:fadeIn .6s ease}
.start-screen .globe{font-size:5rem;display:block;margin-bottom:20px;animation:float 3s ease-in-out infinite}
.start-screen h1{font-size:2.6rem;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#667eea,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.start-screen .subtitle{font-size:1.05rem;opacity:.75;line-height:1.7;margin-bottom:32px}
.start-btn{padding:16px 52px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:16px;color:#fff;font-size:1.15rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;letter-spacing:.3px}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(102,126,234,.4)}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes chipPop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.header{text-align:center;margin-bottom:24px}
.header h1{font-size:1.6rem;font-weight:700;margin-bottom:14px}
.progress-wrap{background:rgba(255,255,255,.1);border-radius:20px;height:7px;overflow:hidden;margin-bottom:8px}
.progress-bar{height:100%;background:linear-gradient(90deg,#667eea,#a855f7);border-radius:20px;transition:width .5s ease;width:0%}
.progress-text{font-size:.88rem;opacity:.7}
.score-display{font-size:1rem;margin-top:4px;font-weight:600;color:#a78bfa}

.card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px;padding:28px 24px;margin-bottom:20px;border:1px solid rgba(255,255,255,.1);animation:fadeIn .5s ease}
.clue-label{font-size:.8rem;text-transform:uppercase;letter-spacing:2.5px;opacity:.55;margin-bottom:18px;text-align:center;font-weight:600}
.clues-container{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.clue-chip{background:rgba(102,126,234,.18);padding:9px 20px;border-radius:30px;font-size:1.05rem;font-weight:600;border:1px solid rgba(102,126,234,.3);animation:chipPop .4s ease backwards;color:#c4b5fd}
.clue-chip:nth-child(1){animation-delay:.08s}
.clue-chip:nth-child(2){animation-delay:.18s}
.clue-chip:nth-child(3){animation-delay:.28s}
.clue-chip:nth-child(4){animation-delay:.38s}
.clue-chip:nth-child(5){animation-delay:.48s}

.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;animation:slideUp .5s ease .3s backwards}
.option-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:16px;padding:16px 14px;color:#fff;font-size:.97rem;cursor:pointer;transition:all .25s ease;display:flex;align-items:center;gap:12px;text-align:left;outline:none;-webkit-tap-highlight-color:transparent}
.option-btn:hover:not(.disabled){background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.3);transform:translateY(-2px)}
.option-btn:active:not(.disabled){transform:scale(.97)}
.option-btn .flag{font-size:2rem;line-height:1;flex-shrink:0}
.option-btn .name{font-weight:600;line-height:1.25}
.option-btn.correct{background:rgba(34,197,94,.25)!important;border-color:#22c55e!important;opacity:1!important}
.option-btn.wrong{background:rgba(239,68,68,.25)!important;border-color:#ef4444!important}
.option-btn.disabled{cursor:default;pointer-events:none;opacity:.45}
.option-btn.disabled.correct{opacity:1}

.next-btn{display:none;width:100%;padding:16px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:16px;color:#fff;font-size:1.05rem;font-weight:700;cursor:pointer;margin-top:16px;transition:transform .2s,box-shadow .2s;animation:slideUp .3s ease}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(102,126,234,.35)}

.summary{text-align:center;animation:fadeIn .6s ease}
.summary h2{font-size:2rem;margin-bottom:24px;font-weight:800}
.final-score{font-size:5rem;font-weight:800;background:linear-gradient(135deg,#667eea,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:4px}
.score-label{font-size:1.1rem;opacity:.6;margin-bottom:24px;font-weight:500}
.message{font-size:1.35rem;margin-bottom:32px;line-height:1.5}
.play-again-btn{padding:16px 48px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:16px;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s}
.play-again-btn:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(102,126,234,.4)}

.review-list{text-align:left;margin:20px 0 28px;max-width:400px;margin-left:auto;margin-right:auto}
.review-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.review-item:last-child{border-bottom:none}
.review-icon{font-size:1.3rem;flex-shrink:0}
.review-flag{font-size:1.5rem;flex-shrink:0}
.review-name{font-weight:600;font-size:.95rem}

@media(max-width:520px){
.options-grid{grid-template-columns:1fr}
.header h1{font-size:1.3rem}
.card{padding:22px 18px}
.start-screen h1{font-size:2rem}
.start-screen .globe{font-size:3.8rem}
.clue-chip{font-size:.95rem;padding:7px 16px}
.option-btn{padding:14px 12px}
.option-btn .flag{font-size:1.7rem}
.option-btn .name{font-size:.9rem}
.final-score{font-size:4rem}
}
</style>
</head>
<body>

<div id="start-screen" class="start-screen">
<span class="globe">🌍</span>
<h1>Country Guesser</h1>
<p class="subtitle">Can you identify countries from 5 mystery clues?<br>Test your geography knowledge - 5 questions per round!</p>
<button class="start-btn" onclick="startGame()">Start Game</button>
</div>

<div id="game-screen" class="hidden">
<div class="header">
<h1>🌍 Country Guesser</h1>
<div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
<div class="progress-text" id="progress-text">Question 1 of 5</div>
<div class="score-display" id="score-display">Score: 0 / 5</div>
</div>
<div class="card" id="clue-card">
<div class="clue-label">🔍 Guess the country</div>
<div class="clues-container" id="clues-container"></div>
</div>
<div class="options-grid" id="options-grid"></div>
<button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
</div>

<div id="summary-screen" class="hidden">
<div class="card summary">
<h2>Game Over!</h2>
<div class="final-score" id="final-score">0 / 5</div>
<div class="score-label">Correct Answers</div>
<div class="message" id="summary-message"></div>
<div class="review-list" id="review-list"></div>
<button class="play-again-btn" onclick="startGame()">🔄 Play Again</button>
</div>
</div>
</div>

];

const QUESTIONS_PER_GAME=5;
const OPTIONS_COUNT=4;
let gameQuestions=[];
let questionIndex=0;
let score=0;
let answered=false;
let results=[];

const shuffle=arr=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};

const $=id=>document.getElementById(id);

function startGame(){
questionIndex=0;score=0;answered=false;results=[];
const shuffled=shuffle(COUNTRIES);
gameQuestions=shuffled.slice(0,QUESTIONS_PER_GAME);
$("start-screen").classList.add("hidden");
$("summary-screen").classList.add("hidden");
$("game-screen").classList.remove("hidden");
renderQuestion();
}

function renderQuestion(){
answered=false;
const q=gameQuestions[questionIndex];
const pct=(questionIndex/QUESTIONS_PER_GAME)*100;
$("progress-bar").style.width=pct+"%";
$("progress-text").textContent=`Question ${questionIndex+1} of ${QUESTIONS_PER_GAME}`;
$("score-display").textContent=`Score: ${score} / ${QUESTIONS_PER_GAME}`;

const cc=$("clues-container");
cc.innerHTML="";
q.clues.forEach(c=>{const s=document.createElement("span");s.className="clue-chip";s.textContent=c;cc.appendChild(s);});

const pool=COUNTRIES.filter(c=>c.name!==q.name);
const distractors=shuffle(pool).slice(0,OPTIONS_COUNT-1);
const options=shuffle([q,...distractors]);

const og=$("options-grid");
og.innerHTML="";
options.forEach(opt=>{
const btn=document.createElement("button");
btn.className="option-btn";
btn.innerHTML=`<span class="flag">${opt.flag}</span><span class="name">${opt.name}</span>`;
btn.addEventListener("click",()=>handleAnswer(btn,opt,q));
og.appendChild(btn);
});

$("next-btn").style.display="none";

const card=$("clue-card");
card.style.animation="none";
void card.offsetHeight;
card.style.animation="fadeIn .5s ease";

og.style.animation="none";
void og.offsetHeight;
og.style.animation="slideUp .5s ease .3s backwards";
}

function handleAnswer(btn,selected,question){
if(answered)return;
answered=true;
const correct=selected.name===question.name;
if(correct){score++;btn.classList.add("correct");}
else{
btn.classList.add("wrong");
document.querySelectorAll(".option-btn").forEach(b=>{
if(b.querySelector(".name").textContent===question.name)b.classList.add("correct");
});
}
results.push({country:question,correct});
document.querySelectorAll(".option-btn").forEach(b=>b.classList.add("disabled"));
$("score-display").textContent=`Score: ${score} / ${QUESTIONS_PER_GAME}`;
const nb=$("next-btn");
nb.textContent=questionIndex<QUESTIONS_PER_GAME-1?"Next Question →":"See Results →";
nb.style.display="block";
}

function nextQuestion(){
questionIndex++;
if(questionIndex>=QUESTIONS_PER_GAME){showSummary();}
else{renderQuestion();}
}

function showSummary(){
$("game-screen").classList.add("hidden");
$("summary-screen").classList.remove("hidden");
$("final-score").textContent=`${score} / ${QUESTIONS_PER_GAME}`;
let msg="";
if(score===5)msg="🏆 Perfect score! Geography genius!";
else if(score===4)msg="🌟 Excellent! So close to perfection!";
else if(score===3)msg="👍 Good job! Solid knowledge!";
else if(score===2)msg="🌍 Not bad! Keep exploring!";
else if(score===1)msg="📚 Room to grow — keep learning!";
else msg="🗺️ Better luck next time!";
$("summary-message").textContent=msg;

const rl=$("review-list");
rl.innerHTML="";
results.forEach(r=>{
const div=document.createElement("div");
div.className="review-item";
div.innerHTML=`<span class="review-icon">${r.correct?"✅":"❌"}</span><span class="review-flag">${r.country.flag}</span><span class="review-name">${r.country.name}</span>`;
rl.appendChild(div);
});
}
</script>
</body>
